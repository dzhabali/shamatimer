<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shama">
<title>Shama</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f0e; --surface: #1e231e; --border: rgba(160,185,160,0.12);
    --text: #d4dfd4; --text2: #8a9e8a; --text3: #5a6b5a;
    --accent: #7aad7a; --accent2: #a8c8a8; --danger: #c87a7a;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-weight: 300; overflow: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 1000; opacity: 0.6;
  }

  /* AUTH */
  #auth-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 32px; z-index: 500;
  }
  #auth-screen.hidden { display: none; }
  .auth-title { font-family: 'Cormorant Garamond', serif; font-size: 40px; font-weight: 300; font-style: italic; color: var(--text); margin-bottom: 6px; }
  .auth-sub { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text3); margin-bottom: 40px; }
  .auth-tabs { display: flex; width: 100%; max-width: 300px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .auth-tab { flex: 1; background: none; border: none; color: var(--text3); font-family: 'Inter', sans-serif; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; padding: 8px; cursor: pointer; border-bottom: 1px solid transparent; margin-bottom: -1px; transition: color 0.2s; }
  .auth-tab.active { color: var(--accent2); border-bottom-color: var(--accent); }
  .auth-form { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; }
  .auth-input { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 300; padding: 12px 16px; border-radius: 8px; outline: none; transition: border-color 0.2s; }
  .auth-input:focus { border-color: rgba(122,173,122,0.4); }
  .auth-input::placeholder { color: var(--text3); }
  .auth-btn { background: rgba(122,173,122,0.12); border: 1px solid rgba(122,173,122,0.3); color: var(--accent2); font-family: 'Inter', sans-serif; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; padding: 12px; border-radius: 8px; cursor: pointer; transition: all 0.2s; margin-top: 4px; }
  .auth-btn:hover { background: rgba(122,173,122,0.2); }
  .auth-error { font-size: 12px; color: var(--danger); text-align: center; min-height: 18px; }
  .auth-guest { margin-top: 24px; background: none; border: none; color: var(--text3); font-family: 'Inter', sans-serif; font-size: 11px; letter-spacing: 0.06em; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
  .auth-guest:hover { color: var(--text2); }

  /* APP */
  #app { height: 100%; display: flex; flex-direction: column; }
  nav { display: flex; justify-content: center; padding: 16px 24px 0; position: relative; align-items: center; }
  .nav-btn { background: none; border: none; color: var(--text3); font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; padding: 8px 20px; cursor: pointer; transition: color 0.3s; border-bottom: 1px solid transparent; }
  .nav-btn.active { color: var(--accent2); border-bottom-color: var(--accent); }
  .nav-user { position: absolute; right: 16px; top: 14px; background: none; border: 1px solid var(--border); color: var(--text3); font-size: 10px; letter-spacing: 0.06em; padding: 5px 10px; border-radius: 12px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .nav-user:hover { color: var(--danger); border-color: rgba(200,122,122,0.3); }

  .screen { display: none; flex: 1; overflow-y: auto; overflow-x: hidden; }
  .screen.active { display: flex; flex-direction: column; }

  /* TIMER */
  #screen-timer { align-items: center; justify-content: center; padding: 24px; gap: 0; }
  .orb-wrap { position: relative; width: 220px; height: 220px; margin-bottom: 32px; }
  .orb { width: 220px; height: 220px; border-radius: 50%; background: radial-gradient(ellipse at 40% 35%, #2a3d2a 0%, #141a14 60%, #0d110d 100%); box-shadow: 0 0 60px rgba(122,173,122,0.08), 0 0 120px rgba(122,173,122,0.04), inset 0 1px 0 rgba(168,200,168,0.1); display: flex; align-items: center; justify-content: center; flex-direction: column; cursor: pointer; transition: box-shadow 0.6s ease; border: 1px solid rgba(122,173,122,0.1); }
  .orb.active { box-shadow: 0 0 80px rgba(122,173,122,0.15), 0 0 160px rgba(122,173,122,0.07), inset 0 1px 0 rgba(168,200,168,0.15); animation: breathe 4s ease-in-out infinite; }
  @keyframes breathe {
    0%,100% { box-shadow: 0 0 80px rgba(122,173,122,0.15), 0 0 160px rgba(122,173,122,0.07), inset 0 1px 0 rgba(168,200,168,0.15); }
    50% { box-shadow: 0 0 100px rgba(122,173,122,0.22), 0 0 200px rgba(122,173,122,0.1), inset 0 1px 0 rgba(168,200,168,0.2); }
  }
  .ring-svg { position: absolute; inset: -10px; width: calc(100% + 20px); height: calc(100% + 20px); transform: rotate(-90deg); pointer-events: none; }
  .ring-track { fill: none; stroke: rgba(122,173,122,0.08); stroke-width: 2; }
  .ring-progress { fill: none; stroke: var(--accent); stroke-width: 2; stroke-linecap: round; transition: stroke-dashoffset 1s linear; opacity: 0.7; }
  .time-display { font-family: 'Cormorant Garamond', serif; font-size: 52px; font-weight: 300; color: var(--text); letter-spacing: -0.01em; line-height: 1; user-select: none; }
  .orb-label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text3); margin-top: 6px; }
  .duration-section { width: 100%; max-width: 340px; margin-bottom: 28px; }
  .duration-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text3); text-align: center; margin-bottom: 14px; }
  .presets { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 16px; }
  .preset-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text2); font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 300; padding: 6px 12px; border-radius: 20px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.04em; }
  .preset-btn:hover { color: var(--text); border-color: rgba(122,173,122,0.25); }
  .preset-btn.active { background: rgba(122,173,122,0.12); border-color: rgba(122,173,122,0.35); color: var(--accent2); }
  .custom-duration { display: flex; align-items: center; justify-content: center; gap: 12px; }
  .dur-adj { background: none; border: 1px solid var(--border); color: var(--text2); width: 32px; height: 32px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-weight: 300; line-height: 1; padding-bottom: 1px; }
  .dur-adj:hover { color: var(--accent2); border-color: rgba(122,173,122,0.35); }
  .dur-value { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; color: var(--text); min-width: 80px; text-align: center; }
  .controls { display: flex; gap: 16px; align-items: center; margin-bottom: 24px; }
  .btn-main { width: 64px; height: 64px; border-radius: 50%; background: rgba(122,173,122,0.1); border: 1px solid rgba(122,173,122,0.25); color: var(--accent2); font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .btn-main:hover { background: rgba(122,173,122,0.18); border-color: rgba(122,173,122,0.45); }
  .btn-main:active { transform: scale(0.95); }
  .btn-secondary { background: none; border: 1px solid var(--border); color: var(--text3); font-size: 13px; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 300; letter-spacing: 0.06em; transition: all 0.2s; }
  .btn-secondary:hover { color: var(--danger); border-color: rgba(200,122,122,0.3); }
  .dimmed nav, .dimmed .duration-section, .dimmed .controls .btn-secondary { opacity: 0; pointer-events: none; transition: opacity 0.8s; }
  .dimmed .orb-wrap { margin-bottom: 0; }

  /* LOG */
  #screen-log { padding: 20px 24px; gap: 0; }
  .log-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; }
  .log-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; color: var(--text); font-style: italic; }
  .log-stats { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; }
  .summary-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  .summary-card-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
  .summary-card-value { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; color: var(--text); }
  .sync-note { font-size: 10px; color: var(--text3); letter-spacing: 0.06em; margin-bottom: 16px; min-height: 14px; }
  .sessions-list { display: flex; flex-direction: column; gap: 8px; }
  .session-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
  .session-item.incomplete { border-color: rgba(200,122,122,0.12); }
  .session-date { font-size: 12px; color: var(--text3); letter-spacing: 0.04em; margin-bottom: 3px; }
  .session-time-range { font-size: 11px; color: var(--text3); }
  .session-right { text-align: right; }
  .session-duration { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; color: var(--text); }
  .session-status { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }
  .session-status.complete { color: var(--accent); }
  .session-status.incomplete { color: var(--danger); opacity: 0.7; }
  .empty-log { text-align: center; padding: 60px 0; color: var(--text3); }
  .empty-log-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
  .empty-log p { font-size: 13px; letter-spacing: 0.06em; }

  /* CALENDAR */
  #screen-calendar { padding: 20px 24px; gap: 0; }
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-arrow { background: none; border: 1px solid var(--border); color: var(--text2); width: 32px; height: 32px; border-radius: 50%; font-size: 18px; cursor: pointer; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; line-height: 1; padding: 0 0 2px; transition: all 0.2s; }
  .cal-arrow:hover { color: var(--accent2); border-color: rgba(122,173,122,0.35); }
  .cal-month-lbl { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; font-style: italic; color: var(--text); }
  .cal-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 18px; display: flex; align-items: baseline; justify-content: space-between; }
  .cal-stat-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); }
  .cal-stat-value { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; color: var(--text); }
  .cal-stat-unit { font-size: 13px; color: var(--text3); margin-left: 2px; }
  .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 6px; }
  .cal-weekdays > div { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); text-align: center; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-cell { aspect-ratio: 1; border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; background: transparent; }
  .cal-cell.empty { opacity: 0; pointer-events: none; }
  .cal-cell.today { border-color: rgba(122,173,122,0.55); }
  .cal-cell .cal-dn { font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .cal-cell .cal-min { font-family: 'Cormorant Garamond', serif; font-size: 14px; font-weight: 300; color: var(--text2); line-height: 1; }
  .cal-cell.lvl-0 .cal-min { display: none; }
  .cal-cell.lvl-1 { background: rgba(122,173,122,0.10); }
  .cal-cell.lvl-2 { background: rgba(122,173,122,0.22); }
  .cal-cell.lvl-3 { background: rgba(122,173,122,0.38); }
  .cal-cell.lvl-4 { background: rgba(122,173,122,0.58); }
  .cal-cell.lvl-5 { background: rgba(122,173,122,0.85); }
  .cal-cell.lvl-4 .cal-min, .cal-cell.lvl-5 .cal-min { color: var(--text); }
  .cal-cell.lvl-5 .cal-dn { color: var(--text2); }

  /* HISTORY add/delete */
  .log-header-right { display: flex; align-items: center; gap: 10px; }
  .log-add { background: none; border: 1px solid var(--border); color: var(--text2); width: 28px; height: 28px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; padding: 0 0 2px; transition: all 0.2s; font-family: 'Inter', sans-serif; }
  .log-add:hover { color: var(--accent2); border-color: rgba(122,173,122,0.35); }
  .session-item { position: relative; }
  .session-del { position: absolute; top: 6px; right: 6px; background: none; border: none; color: var(--text3); font-size: 16px; line-height: 1; cursor: pointer; padding: 4px 8px; border-radius: 50%; transition: all 0.2s; opacity: 0.4; }
  .session-del:hover { color: var(--danger); opacity: 1; background: rgba(200,122,122,0.08); }

  /* MODAL */
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; padding: 24px; z-index: 600; }
  .modal.hidden { display: none; }
  .modal-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 22px; display: flex; flex-direction: column; gap: 12px; min-width: 260px; width: 100%; max-width: 320px; }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; font-style: italic; color: var(--text); margin-bottom: 4px; }
  .modal-label { display: flex; flex-direction: column; gap: 4px; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); }
  .modal-input { background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 300; padding: 10px 14px; border-radius: 8px; outline: none; transition: border-color 0.2s; color-scheme: dark; }
  .modal-input:focus { border-color: rgba(122,173,122,0.4); }
  .modal-actions { display: flex; gap: 10px; margin-top: 6px; }
  .modal-btn { flex: 1; background: none; border: 1px solid var(--border); color: var(--text2); font-family: 'Inter', sans-serif; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; padding: 10px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  .modal-btn:hover { color: var(--text); border-color: rgba(122,173,122,0.3); }
  .modal-btn-primary { background: rgba(122,173,122,0.12); border-color: rgba(122,173,122,0.3); color: var(--accent2); }
  .modal-btn-primary:hover { background: rgba(122,173,122,0.2); }
  .modal-btn:disabled { opacity: 0.5; cursor: default; }
  textarea.modal-input { resize: vertical; min-height: 96px; font-family: 'Inter', sans-serif; line-height: 1.5; }
  .modal-check { flex-direction: row; align-items: center; gap: 8px; font-size: 11px; letter-spacing: 0.04em; text-transform: none; color: var(--text2); cursor: pointer; }
  .modal-check input { accent-color: var(--accent); width: 15px; height: 15px; flex: none; }
  .detail-meta { font-size: 12px; color: var(--text2); letter-spacing: 0.04em; line-height: 1.55; }

  /* clickable session + note marker */
  .session-item { cursor: pointer; }
  .session-note-mark { color: var(--accent); margin-left: 5px; opacity: 0.85; }

  #toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface); border: 1px solid var(--border); color: var(--text2); font-size: 12px; letter-spacing: 0.08em; padding: 10px 20px; border-radius: 20px; opacity: 0; transition: all 0.4s; pointer-events: none; white-space: nowrap; z-index: 999; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-title">Shama</div>
  <div class="auth-sub">meditation timer</div>
  <div class="auth-tabs">
    <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign in</button>
    <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
  </div>
  <div class="auth-form">
    <input class="auth-input" id="auth-email" type="email" placeholder="Email" autocomplete="email">
    <input class="auth-input" id="auth-password" type="password" placeholder="Password" autocomplete="current-password">
    <div class="auth-error" id="auth-error"></div>
    <button class="auth-btn" id="auth-submit" onclick="handleAuth()">Sign in</button>
  </div>
  <button class="auth-guest" onclick="continueAsGuest()">Continue without account</button>
</div>

<!-- APP -->
<div id="app">
  <nav>
    <button class="nav-btn active" onclick="showScreen('timer', event)">Timer</button>
    <button class="nav-btn" onclick="showScreen('calendar', event)">Calendar</button>
    <button class="nav-btn" onclick="showScreen('log', event)">History</button>
    <button class="nav-user" id="nav-user" onclick="doSignOut()">sign out</button>
  </nav>

  <div id="screen-timer" class="screen active">
    <div class="orb-wrap">
      <svg class="ring-svg" viewBox="0 0 240 240">
        <circle class="ring-track" cx="120" cy="120" r="116"/>
        <circle class="ring-progress" id="ring" cx="120" cy="120" r="116" stroke-dasharray="729" stroke-dashoffset="729"/>
      </svg>
      <div class="orb" id="orb" onclick="handleOrbClick()">
        <div class="time-display" id="time-display">▶</div>
        <div class="orb-label" id="orb-label">DPE</div>
      </div>
    </div>
    <div class="duration-section" id="duration-section">
      <div class="duration-label">duration</div>
      <div class="presets">
        <button class="preset-btn" onclick="setPreset(15)">15</button>
        <button class="preset-btn active" onclick="setPreset(30)">30</button>
        <button class="preset-btn" onclick="setPreset(45)">45</button>
        <button class="preset-btn" onclick="setPreset(60)">60</button>
      </div>
      <div class="custom-duration">
        <button class="dur-adj" onclick="adjustDuration(-5)">−</button>
        <div class="dur-value" id="dur-value">30</div>
        <button class="dur-adj" onclick="adjustDuration(5)">+</button>
      </div>
    </div>
    <div class="controls">
      <button class="btn-main" onclick="handleCountdownClick()"><span id="play-icon">▶</span></button>
      <button class="btn-secondary" id="btn-end" onclick="endSession()" style="display:none">finish</button>
    </div>
  </div>

  <div id="screen-calendar" class="screen">
    <div class="cal-nav">
      <button class="cal-arrow" id="cal-prev" aria-label="Previous month">‹</button>
      <div class="cal-month-lbl" id="cal-month">—</div>
      <button class="cal-arrow" id="cal-next" aria-label="Next month">›</button>
    </div>
    <div class="cal-stat">
      <div class="cal-stat-label">avg per active day</div>
      <div class="cal-stat-value" id="cal-avg">— <span class="cal-stat-unit">min</span></div>
    </div>
    <div class="cal-weekdays">
      <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div id="screen-log" class="screen">
    <div class="log-header">
      <div class="log-title">History</div>
      <div class="log-header-right">
        <div class="log-stats" id="log-stats"></div>
        <button class="log-add" onclick="openImport()" aria-label="Import sessions" title="Import history">⤓</button>
        <button class="log-add" onclick="openAddSession()" aria-label="Add session">+</button>
      </div>
    </div>
    <div class="summary-cards" id="summary-cards"></div>
    <div class="sync-note" id="sync-note"></div>
    <div class="sessions-list" id="sessions-list"></div>
  </div>
</div>

<div id="add-modal" class="modal hidden">
  <div class="modal-card">
    <div class="modal-title">Add session</div>
    <label class="modal-label">Date<input class="modal-input" type="date" id="add-date" /></label>
    <label class="modal-label">Minutes<input class="modal-input" type="number" id="add-min" min="1" max="600" placeholder="e.g. 45" /></label>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeAddSession()">Cancel</button>
      <button class="modal-btn modal-btn-primary" onclick="submitAddSession()">Save</button>
    </div>
  </div>
</div>

<div id="detail-modal" class="modal hidden">
  <div class="modal-card">
    <div class="modal-title">Session</div>
    <div class="detail-meta" id="detail-meta"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp, doc, deleteDoc, updateDoc, writeBatch } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyBBNNi5VjSTDmxjheaYdpzMqMZHfzPaHEo",
  authDomain: "shamatimer-3c172.firebaseapp.com",
  projectId: "shamatimer-3c172",
  storageBucket: "shamatimer-3c172.firebasestorage.app",
  messagingSenderId: "501940193954",
  appId: "1:501940193954:web:9e92a0ca42ce0e39e6a5fb"
});

const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let guestMode = false;

onAuthStateChanged(auth, user => {
  if (user) { currentUser = user; guestMode = false; showApp(user.email); }
});

window._handleAuth = async (isLogin, email, password) => {
  if (isLogin) return signInWithEmailAndPassword(auth, email, password);
  return createUserWithEmailAndPassword(auth, email, password);
};

window._signOut = async () => { await signOut(auth); currentUser = null; };
window._getUser = () => currentUser;
window._isGuest = () => guestMode;

window._saveSession = async (session) => {
  if (guestMode || !currentUser) return null;
  const col = collection(db, 'users', currentUser.uid, 'sessions');
  const ref = await addDoc(col, { ...session, createdAt: serverTimestamp() });
  return ref.id;
};

window._deleteSession = async (fid) => {
  if (guestMode || !currentUser || !fid) return;
  await deleteDoc(doc(db, 'users', currentUser.uid, 'sessions', fid));
};

window._loadSessions = async () => {
  if (guestMode || !currentUser) return null;
  const col = collection(db, 'users', currentUser.uid, 'sessions');
  const snap = await getDocs(query(col, orderBy('createdAt', 'desc')));
  return snap.docs.map(d => ({ ...d.data(), firebaseDocId: d.id }));
};

window._updateSession = async (fid, fields) => {
  if (guestMode || !currentUser || !fid) return;
  await updateDoc(doc(db, 'users', currentUser.uid, 'sessions', fid), fields);
};

// Bulk import: deterministic doc id (passed as firebaseDocId) so re-import overwrites, never duplicates.
window._importBatch = async (sessions) => {
  if (guestMode || !currentUser || !sessions.length) return 0;
  const col = collection(db, 'users', currentUser.uid, 'sessions');
  let written = 0;
  for (let i = 0; i < sessions.length; i += 400) {
    const chunk = sessions.slice(i, i + 400);
    const batch = writeBatch(db);
    for (const s of chunk) {
      const { firebaseDocId, ...data } = s;
      batch.set(doc(col, firebaseDocId), { ...data, createdAt: serverTimestamp() });
    }
    await batch.commit();
    written += chunk.length;
    if (window._importProgress) window._importProgress(written, sessions.length);
  }
  return written;
};

window._setGuest = (v) => { guestMode = v; };
window._setUser = (u) => { currentUser = u; };

function showApp(email) {
  document.getElementById('auth-screen').classList.add('hidden');
  const label = guestMode ? 'guest' : email.split('@')[0];
  document.getElementById('nav-user').textContent = label;
  if (window._syncPending) window._syncPending();
}
window._showApp = showApp;

<script>
let totalMinutes = 30;
let totalSeconds = 0;
let currentMode = null; // null | 'stopwatch' | 'countdown'
let sessionStartMs = null, pausedAtMs = null, pausedAccumMs = 0;
let timerInterval = null, isRunning = false, isPaused = false;
let isDimmed = false, dimTimeout = null;
let endingFlag = false;
let audioCtx = null;
let authMode = 'login';

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// SOUND
function playBell(type) {
  const c = getCtx();
  if (type === 'start') { playSakya(c, 0.22); }
  else { playSakya(c, 0.24); setTimeout(() => playSakya(c, 0.18), 2200); }
}
function playSakya(c, gain) {
  strike(c, 1040, gain, 5.5);
  strike(c, 1040*2.76, gain*0.36, 3.0);
  click(c, 0.07);
}
function strike(c, freq, gain, dur) {
  const o = c.createOscillator(), g = c.createGain(), f = c.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = freq*5; o.type = 'sine';
  o.frequency.setValueAtTime(freq, c.currentTime);
  o.frequency.exponentialRampToValueAtTime(freq*0.996, c.currentTime+dur);
  g.gain.setValueAtTime(0, c.currentTime);
  g.gain.linearRampToValueAtTime(gain, c.currentTime+0.008);
  g.gain.exponentialRampToValueAtTime(0.0008, c.currentTime+dur);
  o.connect(f); f.connect(g); g.connect(c.destination);
  o.start(); o.stop(c.currentTime+dur);
}
function click(c, gain) {
  const buf = c.createBuffer(1, c.sampleRate*0.05, c.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*0.008));
  const src=c.createBufferSource(), g=c.createGain(), f=c.createBiquadFilter();
  f.type='highpass'; f.frequency.value=3000; src.buffer=buf; g.gain.value=gain;
  src.connect(f); f.connect(g); g.connect(c.destination); src.start();
}

// LOCAL STORAGE
function loadLocal() { try { return JSON.parse(localStorage.getItem('shama_sessions')||'[]'); } catch{return[];} }
function saveLocal(s) { localStorage.setItem('shama_sessions', JSON.stringify(s)); }

async function logSession(durationSec, planned, complete, mode) {
  const now = new Date();
  const startDate = sessionStartMs ? new Date(sessionStartMs) : new Date(now - durationSec*1000);
  const session = { id: Date.now(), date: startDate.toISOString(), endDate: now.toISOString(), durationSec, plannedSec: planned, complete, mode: mode || 'countdown' };
  const sessions = loadLocal(); sessions.unshift(session); saveLocal(sessions);
  try {
    if (window._saveSession) {
      const fid = await window._saveSession(session);
      if (fid) { session.firebaseDocId = fid; saveLocal(sessions); }
    }
  } catch(e){}
}

// Re-sync local sessions that never reached the cloud (created offline, in guest mode,
// or while the database was unreachable). Runs on app open / tab focus; self-heals.
let syncingPending = false;
async function syncPendingLocal() {
  if (syncingPending) return;
  const u = window._getUser ? window._getUser() : null;
  if (!window._saveSession || (window._isGuest && window._isGuest()) || !u) return;
  if (!loadLocal().some(s => s && !s.firebaseDocId)) return;
  syncingPending = true;
  try {
    const pending = loadLocal().filter(s => s && !s.firebaseDocId);
    for (const p of pending) {
      let fid;
      try { fid = await window._saveSession(p); }
      catch(e) { break; } // still offline — heal on next open
      if (!fid) continue;
      const cur = loadLocal();
      const t = cur.find(s => s.id === p.id);
      if (t && !t.firebaseDocId) { t.firebaseDocId = fid; saveLocal(cur); }
    }
  } finally {
    syncingPending = false;
  }
}
window._syncPending = syncPendingLocal;

// AUTH
function switchTab(mode) {
  authMode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode==='login');
  document.getElementById('tab-register').classList.toggle('active', mode==='register');
  document.getElementById('auth-submit').textContent = mode==='login' ? 'Sign in' : 'Create account';
  document.getElementById('auth-error').textContent = '';
}
window.switchTab = switchTab;

async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-error');
  errEl.textContent = '';
  try {
    const cred = await window._handleAuth(authMode==='login', email, password);
    window._setUser(cred.user);
    window._setGuest(false);
    window._showApp(cred.user.email);
  } catch(e) {
    const msgs = {'auth/invalid-email':'Invalid email','auth/user-not-found':'User not found','auth/wrong-password':'Wrong password','auth/email-already-in-use':'Email already registered','auth/weak-password':'Password min 6 chars','auth/invalid-credential':'Wrong email or password'};
    errEl.textContent = msgs[e.code] || 'Error: ' + e.message;
  }
}
window.handleAuth = handleAuth;

function continueAsGuest() {
  window._setGuest(true);
  window._setUser(null);
  window._showApp('guest');
}
window.continueAsGuest = continueAsGuest;

async function doSignOut() {
  try { if (!window._isGuest()) await window._signOut(); } catch(e){}
  window._setUser(null);
  window._setGuest(false);
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('auth-email').value = '';
  document.getElementById('auth-password').value = '';
}
window.doSignOut = doSignOut;

// TIMER
function setPreset(min) { totalMinutes=min; updateDurDisplay(); updatePresetBtns(); }
function adjustDuration(delta) { totalMinutes=Math.max(5,Math.min(240,totalMinutes+delta)); updateDurDisplay(); updatePresetBtns(); }
window.setPreset=setPreset; window.adjustDuration=adjustDuration;

function updateDurDisplay() {
  if (!isRunning&&!isPaused) {
    document.getElementById('dur-value').textContent=totalMinutes;
  }
}
function updatePresetBtns() {
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.toggle('active',parseInt(b.textContent)===totalMinutes));
}
function fmt(sec) { return String(Math.floor(sec/60)).padStart(2,'0')+':'+String(sec%60).padStart(2,'0'); }
function fmtCountUp(sec) { return Math.floor(sec/60)+':'+String(sec%60).padStart(2,'0'); }
function pad(n) { return String(n).padStart(2,'0'); }

function elapsedSec() {
  if (!sessionStartMs) return 0;
  const now = Date.now();
  const pausedNow = pausedAtMs ? (now - pausedAtMs) : 0;
  return Math.max(0, Math.floor((now - sessionStartMs - pausedAccumMs - pausedNow) / 1000));
}
function secondsLeft() { return Math.max(0, totalSeconds - elapsedSec()); }

const ACTIVE_KEY = 'shama_active';
function saveActiveState() {
  if (!sessionStartMs) { try { localStorage.removeItem(ACTIVE_KEY); } catch(e){} return; }
  try {
    localStorage.setItem(ACTIVE_KEY, JSON.stringify({
      sessionStartMs, totalSeconds, pausedAtMs, pausedAccumMs, isRunning, isPaused, currentMode
    }));
  } catch(e){}
}

function handleOrbClick() {
  if (isDimmed){undim();return;}
  if (currentMode === 'countdown') return; // mode lock
  if (!isRunning&&!isPaused) startStopwatch();
  else if (isRunning) pauseSession();
  else if (isPaused) resumeSession();
}
window.handleOrbClick=handleOrbClick;

function handleCountdownClick() {
  if (isDimmed){undim();return;}
  if (currentMode === 'stopwatch') return; // mode lock
  if (!isRunning&&!isPaused) startCountdown();
  else if (isRunning) pauseSession();
  else if (isPaused) resumeSession();
}
window.handleCountdownClick=handleCountdownClick;

function startStopwatch() {
  getCtx().resume();
  currentMode='stopwatch';
  totalSeconds=0;
  sessionStartMs=Date.now(); pausedAtMs=null; pausedAccumMs=0;
  isRunning=true; isPaused=false; endingFlag=false;
  saveActiveState();
  playBell('start'); updateTimerUI(); tick(); dimAfterDelay();
}
function startCountdown() {
  getCtx().resume();
  currentMode='countdown';
  totalSeconds=totalMinutes*60;
  sessionStartMs=Date.now(); pausedAtMs=null; pausedAccumMs=0;
  isRunning=true; isPaused=false; endingFlag=false;
  saveActiveState();
  playBell('start'); updateTimerUI(); tick(); dimAfterDelay();
}
function pauseSession() {
  clearInterval(timerInterval);
  pausedAtMs=Date.now();
  isRunning=false; isPaused=true;
  saveActiveState();
  clearTimeout(dimTimeout); if(isDimmed)undim();
  updateTimerUI();
}
function resumeSession() {
  if (pausedAtMs){ pausedAccumMs += Date.now() - pausedAtMs; pausedAtMs=null; }
  isRunning=true; isPaused=false;
  saveActiveState();
  updateTimerUI();
  tick(); dimAfterDelay();
}
async function endSession() {
  if (endingFlag) return;
  endingFlag=true;
  const elapsed=elapsedSec();
  const mode=currentMode;
  const complete = mode==='stopwatch' ? true : (elapsed>=totalSeconds);
  clearInterval(timerInterval); clearTimeout(dimTimeout);
  if(isDimmed)undim();
  if(elapsed>3){
    await logSession(elapsed, mode==='stopwatch'?null:totalSeconds, complete, mode);
    showToast(complete?'Session complete ✓':'Session saved');
  }
  isRunning=false; isPaused=false;
  currentMode=null;
  sessionStartMs=null; pausedAtMs=null; pausedAccumMs=0;
  saveActiveState();
  resetTimerUI();
}
window.endSession=endSession;

function tick() {
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if (currentMode==='countdown') {
      const left=secondsLeft();
      if(left<=0){
        clearInterval(timerInterval);
        playBell('end');
        endSession();
        return;
      }
    }
    updateTimerUI();
  },1000);
}
function updateTimerUI() {
  const td=document.getElementById('time-display');
  const ring=document.getElementById('ring');
  const orb=document.getElementById('orb');
  const label=document.getElementById('orb-label');
  const playIcon=document.getElementById('play-icon');
  if (currentMode==='stopwatch') {
    td.textContent=fmtCountUp(elapsedSec());
    ring.style.strokeDashoffset='729';
    orb.classList.toggle('active', isRunning);
    label.textContent = isPaused ? '▶' : (isRunning ? '⏸' : 'DPE');
    playIcon.textContent='▶';
  } else if (currentMode==='countdown') {
    const left=secondsLeft();
    const total=totalSeconds || (totalMinutes*60);
    td.textContent=fmt(left);
    ring.style.strokeDashoffset=729*(1-(left/total));
    orb.classList.toggle('active', isRunning);
    label.textContent = isPaused ? 'paused' : '';
    playIcon.textContent=isRunning?'⏸':'▶';
  }
  document.getElementById('btn-end').style.display='inline-block';
  document.getElementById('duration-section').style.display='none';
}
function resetTimerUI() {
  document.getElementById('time-display').textContent='▶';
  document.getElementById('ring').style.strokeDashoffset='729';
  document.getElementById('orb').classList.remove('active');
  document.getElementById('orb-label').textContent='DPE';
  document.getElementById('play-icon').textContent='▶';
  document.getElementById('btn-end').style.display='none';
  document.getElementById('duration-section').style.display='block';
}

// DIM
function dimAfterDelay(){clearTimeout(dimTimeout);dimTimeout=setTimeout(()=>{if(isRunning)dim();},6000);}
function dim(){isDimmed=true;document.getElementById('app').classList.add('dimmed');}
function undim(){isDimmed=false;document.getElementById('app').classList.remove('dimmed');if(isRunning)dimAfterDelay();}
document.getElementById('app').addEventListener('click',()=>{if(isDimmed)undim();});

// NAV
function showScreen(name,e) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  if(e)e.target.classList.add('active');
  if(name==='log')renderLog();
  if(name==='calendar')renderCalendar();
}
window.showScreen=showScreen;

// LOG
let lastRenderedSessions = [];
async function renderLog() {
  const list=document.getElementById('sessions-list');
  const sumEl=document.getElementById('summary-cards');
  const statsEl=document.getElementById('log-stats');
  const syncEl=document.getElementById('sync-note');

  let sessions=loadLocal();

  if(window._loadSessions && !window._isGuest()) {
    syncEl.textContent='Syncing...';
    try {
      const cloud=await window._loadSessions();
      if(cloud){
        const map=new Map();
        for (const s of cloud) if (s && s.id!=null) map.set(s.id, s);
        for (const s of sessions) if (s && s.id!=null && !map.has(s.id)) map.set(s.id, s);
        sessions=Array.from(map.values()).sort((a,b)=>new Date(b.date)-new Date(a.date));
        syncEl.textContent='✓ Synced with cloud';
      } else syncEl.textContent='';
    } catch(e){syncEl.textContent='Offline — showing local data';}
  } else {
    syncEl.textContent=window._isGuest()?'Guest mode — data is local only':'';
  }

  if(!sessions.length){
    sumEl.innerHTML='';
    list.innerHTML='<div class="empty-log"><div class="empty-log-icon">◯</div><p>No sessions yet</p></div>';
    statsEl.textContent=''; return;
  }

  const totalMin=Math.round(sessions.reduce((a,s)=>a+s.durationSec,0)/60);
  const streak=calcStreak(sessions);
  statsEl.textContent=sessions.length+' sessions';
  sumEl.innerHTML=`
    <div class="summary-card">
      <div class="summary-card-label">Total time</div>
      <div class="summary-card-value">${totalMin<60?totalMin+'<span style="font-size:14px;color:var(--text3)"> min</span>':Math.floor(totalMin/60)+'<span style="font-size:14px;color:var(--text3)"> h '+totalMin%60+' min</span>'}</div>
    </div>
    <div class="summary-card">
      <div class="summary-card-label">Day streak</div>
      <div class="summary-card-value">${streak}<span style="font-size:14px;color:var(--text3)"> days</span></div>
    </div>`;

  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dy=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  lastRenderedSessions = sessions;
  list.innerHTML=sessions.map(s=>{
    const st=new Date(s.date),en=new Date(s.endDate),dur=Math.round(s.durationSec/60);
    const fid=(s.firebaseDocId||'').replace(/'/g,"\\'");
    const hasNote=!!(s.note&&s.note.trim());
    return `<div class="session-item ${s.complete?'':'incomplete'}" onclick="openSessionDetail(${s.id})">
      <button class="session-del" onclick="event.stopPropagation();deleteSession(${s.id},'${fid}')" aria-label="Delete session">×</button>
      <div>
        <div class="session-date">${dy[st.getDay()]}, ${st.getDate()} ${mo[st.getMonth()]}${hasNote?' <span class="session-note-mark">✎</span>':''}</div>
        <div class="session-time-range">${pad(st.getHours())}:${pad(st.getMinutes())} — ${pad(en.getHours())}:${pad(en.getMinutes())}</div>
      </div>
      <div class="session-right">
        <div class="session-duration">${dur} <span style="font-size:13px;color:var(--text3)">min</span></div>
        <div class="session-status ${s.complete?'complete':'incomplete'}">${s.complete?'complete':'partial'}</div>
      </div>
    </div>`;
  }).join('');
}

async function deleteSession(id, fid) {
  if (!confirm('Delete this session?')) return;
  const sessions = loadLocal().filter(s => s.id !== id);
  saveLocal(sessions);
  try { if (fid && window._deleteSession) await window._deleteSession(fid); } catch(e){}
  renderLog();
  if (document.getElementById('screen-calendar').classList.contains('active')) renderCalendar();
}
window.deleteSession=deleteSession;

// CALENDAR
let calYear, calMonth;
(function initCalDate(){ const d=new Date(); calYear=d.getFullYear(); calMonth=d.getMonth(); })();

async function getSessionsByDay() {
  let sessions = loadLocal();
  if (window._loadSessions && !window._isGuest()) {
    try {
      const cloud = await window._loadSessions();
      if (cloud) {
        const map = new Map();
        for (const s of cloud) if (s && s.id!=null) map.set(s.id, s);
        for (const s of sessions) if (s && s.id!=null && !map.has(s.id)) map.set(s.id, s);
        sessions = Array.from(map.values());
      }
    } catch(e){}
  }
  const byDay = {};
  for (const s of sessions) {
    if (!s.date || !s.durationSec) continue;
    const key = new Date(s.date).toISOString().slice(0,10);
    byDay[key] = (byDay[key]||0) + s.durationSec;
  }
  return byDay;
}

function calLevel(min) {
  if (min<=0) return 0;
  if (min<=20) return 1;
  if (min<=40) return 2;
  if (min<=59) return 3;
  if (min<=90) return 4;
  return 5;
}

async function renderCalendar() {
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('cal-month').textContent = mo[calMonth] + ' ' + calYear;
  const byDay = await getSessionsByDay();
  const first = new Date(calYear, calMonth, 1);
  const startDow = (first.getDay()+6) % 7; // Mon=0..Sun=6
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const todayKey = new Date().toISOString().slice(0,10);
  let html = '';
  for (let i=0;i<startDow;i++) html += '<div class="cal-cell empty"></div>';
  let sumMin = 0, daysWithData = 0;
  for (let d=1; d<=daysInMonth; d++) {
    const key = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const sec = byDay[key] || 0;
    const min = Math.round(sec/60);
    if (min>0) { sumMin += min; daysWithData++; }
    const lvl = calLevel(min);
    const todayCls = key === todayKey ? ' today' : '';
    html += `<div class="cal-cell lvl-${lvl}${todayCls}"><div class="cal-dn">${d}</div><div class="cal-min">${min}</div></div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
  const avg = daysWithData ? Math.round(sumMin / daysWithData) : 0;
  document.getElementById('cal-avg').innerHTML = avg ? `${avg} <span class="cal-stat-unit">min</span>` : '— <span class="cal-stat-unit">min</span>';
}

document.getElementById('cal-prev').addEventListener('click', () => {
  calMonth--; if (calMonth<0) { calMonth=11; calYear--; }
  renderCalendar();
});
document.getElementById('cal-next').addEventListener('click', () => {
  calMonth++; if (calMonth>11) { calMonth=0; calYear++; }
  renderCalendar();
});

// ADD SESSION
function openAddSession() {
  document.getElementById('add-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('add-min').value = '';
  document.getElementById('add-modal').classList.remove('hidden');
}
function closeAddSession() {
  document.getElementById('add-modal').classList.add('hidden');
}
async function submitAddSession() {
  const date = document.getElementById('add-date').value;
  const minStr = document.getElementById('add-min').value;
  const min = parseInt(minStr, 10);
  if (!date || !min || min<=0) { showToast('Enter date and minutes'); return; }
  const start = new Date(date + 'T12:00:00');
  const end = new Date(start.getTime() + min*60*1000);
  const session = {
    id: Date.now(),
    date: start.toISOString(),
    endDate: end.toISOString(),
    durationSec: min*60,
    plannedSec: null,
    complete: true,
    mode: 'manual'
  };
  const sessions = loadLocal(); sessions.unshift(session); saveLocal(sessions);
  try {
    if (window._saveSession) {
      const fid = await window._saveSession(session);
      if (fid) { session.firebaseDocId = fid; saveLocal(sessions); }
    }
  } catch(e){}
  closeAddSession();
  showToast('Session added');
  renderLog();
  if (document.getElementById('screen-calendar').classList.contains('active')) renderCalendar();
}
window.openAddSession=openAddSession;
window.closeAddSession=closeAddSession;
window.submitAddSession=submitAddSession;

// SESSION DETAIL / NOTE
let detailSessionId = null;
function openSessionDetail(id) {
  const s = (lastRenderedSessions||[]).find(x => x.id === id);
  if (!s) return;
  detailSessionId = id;
  const st = new Date(s.date), en = new Date(s.endDate), dur = Math.round(s.durationSec/60);
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dy=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const act = (s.activity && s.activity.toLowerCase() !== 'meditation') ? ' · ' + s.activity : '';
  document.getElementById('detail-meta').innerHTML =
    `${dy[st.getDay()]}, ${st.getDate()} ${mo[st.getMonth()]} ${st.getFullYear()}<br>` +
    `${pad(st.getHours())}:${pad(st.getMinutes())} — ${pad(en.getHours())}:${pad(en.getMinutes())} · ${dur} min${act}`;
  document.getElementById('detail-note').value = s.note || '';
  document.getElementById('detail-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('detail-note').focus(), 50);
}
function closeSessionDetail() {
  document.getElementById('detail-modal').classList.add('hidden');
  detailSessionId = null;
}
async function saveSessionNote() {
  if (detailSessionId == null) return;
  const note = document.getElementById('detail-note').value.trim();
  const sessions = loadLocal();
  let target = sessions.find(s => s.id === detailSessionId);
  if (target) {
    target.note = note;
  } else {
    // cloud-only session not in localStorage — upsert it locally with the note
    const fromRender = (lastRenderedSessions||[]).find(s => s.id === detailSessionId);
    if (fromRender) { target = { ...fromRender, note }; sessions.unshift(target); }
  }
  saveLocal(sessions);
  const r = (lastRenderedSessions||[]).find(s => s.id === detailSessionId);
  if (r) r.note = note;
  try {
    if (target && target.firebaseDocId && window._updateSession) {
      await window._updateSession(target.firebaseDocId, { note });
    }
  } catch(e){}
  closeSessionDetail();
  showToast('Note saved');
  renderLog();
}
window.openSessionDetail=openSessionDetail;
window.closeSessionDetail=closeSessionDetail;
window.saveSessionNote=saveSessionNote;

// IMPORT
let importParsed = null;
function openImport() {
  importParsed = null;
  document.getElementById('import-file').value = '';
  document.getElementById('import-yoga').checked = false;
  document.getElementById('import-skip-short').checked = true;
  document.getElementById('import-preview').textContent = '';
  document.getElementById('import-modal').classList.remove('hidden');
}
function closeImport() {
  document.getElementById('import-modal').classList.add('hidden');
}
function applyImportFilters(arr) {
  const yoga = document.getElementById('import-yoga').checked;
  const skipShort = document.getElementById('import-skip-short').checked;
  return arr.filter(s => {
    const act = (s.activity || 'meditation').toLowerCase();
    if (!yoga && act !== 'meditation') return false;
    if (skipShort && (s.durationSec || 0) < 60) return false;
    return true;
  });
}
async function existingIds() {
  const ids = new Set(loadLocal().map(s => s.id));
  if (window._loadSessions && !window._isGuest()) {
    try { const cloud = await window._loadSessions(); if (cloud) for (const c of cloud) ids.add(c.id); } catch(e){}
  }
  return ids;
}
async function updateImportPreview() {
  const preview = document.getElementById('import-preview');
  if (!importParsed) { preview.textContent = ''; return; }
  const filtered = applyImportFilters(importParsed);
  const ids = await existingIds();
  const fresh = filtered.filter(s => !ids.has(s.id)).length;
  preview.innerHTML = `${fresh} new · ${filtered.length - fresh} already imported · ${importParsed.length} in file`;
}
async function runImport() {
  if (!importParsed) { showToast('Choose a JSON file'); return; }
  const goBtn = document.getElementById('import-go');
  const filtered = applyImportFilters(importParsed);
  const ids = await existingIds();
  const fresh = filtered.filter(s => !ids.has(s.id)).map(s => ({
    id: s.id, date: s.date, endDate: s.endDate, durationSec: s.durationSec,
    plannedSec: s.plannedSec ?? null, complete: s.complete !== false,
    mode: s.mode || 'imported', source: s.source || 'insight-timer',
    activity: s.activity || 'meditation', note: s.note || '',
    firebaseDocId: 'it_' + s.id
  }));
  if (!fresh.length) { showToast('Nothing new to import'); return; }
  goBtn.disabled = true; goBtn.textContent = 'Importing…';
  // local upsert
  const localMap = new Map(loadLocal().map(s => [s.id, s]));
  for (const s of fresh) localMap.set(s.id, s);
  saveLocal(Array.from(localMap.values()).sort((a,b)=>new Date(b.date)-new Date(a.date)));
  // cloud batch
  let cloudCount = 0;
  try {
    if (window._importBatch && !window._isGuest()) {
      window._importProgress = (done, total) => { goBtn.textContent = `Importing… ${done}/${total}`; };
      cloudCount = await window._importBatch(fresh);
    }
  } catch(e){ showToast('Cloud sync failed — saved locally'); }
  goBtn.disabled = false; goBtn.textContent = 'Import';
  closeImport();
  showToast(`Imported ${fresh.length} sessions${cloudCount ? ' (synced)' : ''}`);
  renderLog();
  if (document.getElementById('screen-calendar').classList.contains('active')) renderCalendar();
}
window.openImport=openImport;
window.closeImport=closeImport;
window.runImport=runImport;

function calcStreak(sessions) {
  if(!sessions.length)return 0;
  const dates=[...new Set(sessions.map(s=>new Date(s.date).toDateString()))];
  let streak=0;const c=new Date();
  for(let i=0;i<365;i++){if(dates.includes(c.toDateString())){streak++;c.setDate(c.getDate()-1);}else break;}
  return streak;
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

function restoreActiveState() {
  let raw; try { raw=localStorage.getItem(ACTIVE_KEY); } catch(e){ return; }
  if (!raw) return;
  let s; try { s=JSON.parse(raw); } catch(e){ try{localStorage.removeItem(ACTIVE_KEY);}catch(_){}; return; }
  sessionStartMs=s.sessionStartMs; totalSeconds=s.totalSeconds||0;
  pausedAtMs=s.pausedAtMs||null; pausedAccumMs=s.pausedAccumMs||0;
  isRunning=!!s.isRunning; isPaused=!!s.isPaused;
  currentMode = s.currentMode || (totalSeconds>0 ? 'countdown' : null);
  if (currentMode==='countdown' && totalSeconds>0) {
    totalMinutes=Math.max(5,Math.round(totalSeconds/60));
  }
  updateDurDisplay(); updatePresetBtns();
  if (currentMode==='countdown' && isRunning && elapsedSec()>=totalSeconds) {
    playBell('end');
    endSession();
    return;
  }
  if (isRunning || isPaused) {
    updateTimerUI();
    if (isRunning) tick();
  }
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') return;
  if (window._syncPending) window._syncPending();
  if (currentMode==='countdown' && isRunning && elapsedSec() >= totalSeconds) {
    playBell('end');
    endSession();
  } else if (isRunning) {
    updateTimerUI();
    tick();
  }
});

document.getElementById('import-file').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) { importParsed = null; updateImportPreview(); return; }
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      importParsed = Array.isArray(data) ? data : (data.sessions || []);
    } catch(err) {
      importParsed = null;
      document.getElementById('import-preview').textContent = 'Invalid JSON file';
      return;
    }
    updateImportPreview();
  };
  reader.readAsText(file);
});
document.getElementById('import-yoga').addEventListener('change', updateImportPreview);
document.getElementById('import-skip-short').addEventListener('change', updateImportPreview);

updatePresetBtns();
restoreActiveState();
</script>
</body>
